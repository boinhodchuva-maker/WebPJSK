```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PJSK Intense</title>

<style>
body{
margin:0;
background:black;
overflow:hidden;
}

video{
width:100vw;
height:100vh;
object-fit:cover;
}
</style>
</head>

<body>

<video id="main">
<source src="main-screen.mp4" type="video/mp4">
</video>

<script>

let video = document.getElementById("main")
let started = false
let used = false

document.addEventListener("click", () => {

if(!started){
video.play()
started = true
return
}

if(!used && video.currentTime < 15){
used = true
video.currentTime = 15
}

})

video.onended = () => {

window.location.href = "game.html"

}

</script>

</body>
</html>
```
