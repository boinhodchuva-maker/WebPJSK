```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PJSK Intense</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
}

video{
width:100vw;
height:100vh;
object-fit:cover;
}

</style>
</head>

<body>

<video id="main" autoplay>
<source src="main screen.mp4" type="video/mp4">
</video>

<script>

let video = document.getElementById("main")
let used = false

document.addEventListener("click", () => {

if(!used && video.currentTime < 15){
used = true
video.currentTime = 15
}

})

video.onended = () => {

window.location.href = "game.html"

}

</script>

</body>
</html>
